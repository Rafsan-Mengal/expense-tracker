<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">
</head>
<body>
<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="enter">Enter Data</div>
    <div class="tab" data-tab="preview">Preview Data</div>
  </div>

  <!-- ENTER TAB -->
  <div id="enter-tab" class="tab-content active">
    <label>Date</label>
    <input type="date" id="date" />

    <label>Type</label>
    <select id="type">
      <option value="expense">Expense</option>
      <option value="income">Income</option>
      <option value="adjustment">Adjustment</option>
    </select>

    <label>Party (who is this for?)</label>
    <input type="text" id="party" placeholder="e.g. Party A, Client X" list="party-suggestions" />
    <datalist id="party-suggestions"></datalist>

    <label>Mode</label>
    <select id="mode">
      <option value="cash">Cash</option>
      <option value="online">Online</option>
      <option value="bank">Bank</option>
    </select>

    <label>Category</label>
    <select id="category">
      <option value="food">Food</option>
      <option value="fuel">Fuel</option>
      <option value="salary">Salary</option>
      <option value="shopping">Shopping</option>
      <option value="bills">Bills</option>
      <option value="other">Other</option>
    </select>

    <label>Items (one per line: item = price)</label>
    <textarea id="items-input" placeholder="Burger = 550&#10;Tea = 80"></textarea>
    <div class="live-total">Total: <span id="live-total">0.00</span></div>

    <div class="quick-add">
      <input type="text" id="quick-name" placeholder="Item name" />
      <input type="number" id="quick-price" placeholder="Price" step="0.01" min="0" />
      <button id="quick-add-btn">Add Item</button>
    </div>

    <label>Cash Notes (serial numbers, one per line)</label>
    <textarea id="cash-notes" placeholder="AB1234567&#10;CD8877665" rows="2"></textarea>

    <label>Additional Note</label>
    <input type="text" id="general-note" placeholder="Any extra info..." />

    <button id="save-btn">Save Entry</button>
  </div>

  <!-- PREVIEW TAB -->
  <div id="preview-tab" class="tab-content">
    <input type="text" class="search-box" id="search-input" placeholder="Search..." />
    <div class="filter-bar">
      <select id="filter-type">
        <option value="">All Types</option>
        <option value="expense">Expense</option>
        <option value="income">Income</option>
        <option value="adjustment">Adjustment</option>
      </select>
      <select id="filter-mode">
        <option value="">All Modes</option>
        <option value="cash">Cash</option>
        <option value="online">Online</option>
        <option value="bank">Bank</option>
      </select>
      <select id="filter-category">
        <option value="">All Categories</option>
        <option value="food">Food</option>
        <option value="fuel">Fuel</option>
        <option value="salary">Salary</option>
        <option value="shopping">Shopping</option>
        <option value="bills">Bills</option>
        <option value="other">Other</option>
      </select>
      <input type="text" id="filter-party" placeholder="Party" />
      <input type="date" id="filter-date" />
    </div>
    <div id="entries-container"></div>

    <div class="action-row">
      <button id="export-json-btn">Export JSON</button>
      <label class="import-btn">
        Import JSON
        <input type="file" id="import-json-input" accept=".json" hidden />
      </label>
      <button id="reset-sync-btn" class="small-btn">Reset Sheet URL</button>
    </div>
    <button id="sync-btn" class="danger-btn">Sync to Google Sheets</button>
    <div id="sync-status" class="sync-status"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
